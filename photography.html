    </main>

  <script>
  const galleries = document.querySelectorAll("[data-photo-gallery]");

  galleries.forEach((gallery) => {
    const slides = gallery.querySelectorAll(".photography-gallery-slide");
    const dots = gallery.querySelectorAll(".photography-gallery-dot");
    let currentIndex = 0;
    let intervalId;

    const showSlide = (index) => {
      slides.forEach((slide, i) => {
        slide.classList.toggle("active", i === index);
      });

      dots.forEach((dot, i) => {
        dot.classList.toggle("active", i === index);
      });

      currentIndex = index;
    };

    const nextSlide = () => {
      const nextIndex = (currentIndex + 1) % slides.length;
      showSlide(nextIndex);
    };

    const startAutoplay = () => {
      intervalId = window.setInterval(nextSlide, 4500);
    };

    const resetAutoplay = () => {
      window.clearInterval(intervalId);
      startAutoplay();
    };

    dots.forEach((dot, index) => {
      dot.addEventListener("click", () => {
        showSlide(index);
        resetAutoplay();
      });
    });

    showSlide(0);
    startAutoplay();
  });
</script>
